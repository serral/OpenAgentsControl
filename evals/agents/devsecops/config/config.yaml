# DevSecOps Specialist Test Configuration

agent: devsecops
description: "Infrastructure security specialist for IaC scanning, container security, and hardening"

defaults:
  model: anthropic/claude-sonnet-4-5
  timeout: 60000
  approvalStrategy:
    type: auto-approve

testPaths:
  - tests/planning
  - tests/context-loading
  - tests/implementation
  - tests/error-handling
  - tests/long-horizon
  - tests/completion

expectations:
  requiresTextApproval: true
  usesToolPermissions: true
  loadsContextOnDemand: true
  responsePrefix: ""
