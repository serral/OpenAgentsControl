id: devsecops-incremental-001
name: Incremental Security Scanning
description: |
  Verifies devsecops scans incrementally (IaC, then containers, then K8s)

category: implementation
agent: devsecops
model: anthropic/claude-sonnet-4-5

prompt: |
  Scan this deployment:
  - Terraform configs in ./terraform/
  - Dockerfile in ./docker/
  - K8s manifests in ./k8s/

behavior:
  mustContain:
    - "terraform"
    - "docker"
  mustUseAnyOf:
    - [bash, read]
  minToolCalls: 2

approvalStrategy:
  type: auto-approve

timeout: 60000

tags:
  - incremental
