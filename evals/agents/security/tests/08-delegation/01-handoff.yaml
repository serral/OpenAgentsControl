id: security-handoff-001
name: Proper Clearance Decision Handoff
description: |
  Verifies security orchestrator provides clear approval/block decision
  with all necessary details for devops to proceed or remediate

category: delegation
agent: security/security-orchestrator
model: anthropic/claude-sonnet-4-5

prompt: |
  Review these clearance reports and provide final decision:
  
  InfoSec: CLEAR with conditions
  - Condition: Enable audit logging for all API calls
  - Condition: Implement data retention policy (7 years)
  
  DevSecOps: CLEAR with conditions
  - Condition: Enable encryption at rest for all data stores
  - Condition: Implement network segmentation
  
  What is your final decision and what should devops do next?

behavior:
  mustContain:
    - "APPROVED"
    - "conditions"
    - "audit logging"
    - "encryption"
  mustNotContain:
    - "BLOCKED"
  minToolCalls: 0

expectedViolations:
  - rule: clear-handoff-instructions
    shouldViolate: false
    severity: error

approvalStrategy:
  type: auto-approve

timeout: 30000

tags:
  - completion
  - handoff
  - approval
