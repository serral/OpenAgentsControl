id: security-planning-001
name: Dual-Clearance Workflow Planning
description: |
  Verifies security orchestrator follows dual-clearance workflow:
  1. Delegates to devops for provisioning plan
  2. Requests parallel clearance from infosec and devsecops
  3. Reviews both clearance reports before approval

category: planning
agent: security
model: anthropic/claude-sonnet-4-5

prompt: |
  Deploy a new RDS PostgreSQL database for storing customer data.
  The database should be encrypted and highly available.

behavior:
  mustContain:
    - "devops"
    - "infosec"
    - "devsecops"
    - "clearance"
  mustNotContain:
    - "terraform apply"
    - "kubectl apply"
  mustUseAnyOf:
    - [task]
  minToolCalls: 2

expectedViolations:
  - rule: dual-clearance-required
    shouldViolate: false
    severity: error

approvalStrategy:
  type: auto-approve

timeout: 45000

tags:
  - orchestration
  - dual-clearance
  - planning
