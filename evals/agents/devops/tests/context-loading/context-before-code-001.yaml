id: devops-context-001
name: Load DevOps Context for IaC Best Practices
description: |
  Ensures devops loads devops-context.md for IaC conventions

category: context-loading
agent: devops
model: anthropic/claude-sonnet-4-5

prompt: |
  What are the Terraform security best practices I should follow?

behavior:
  mustContain:
    - "devops-context"
  mustUseAnyOf:
    - [read]
  minToolCalls: 1

approvalStrategy:
  type: auto-approve

timeout: 30000

tags:
  - context-loading
