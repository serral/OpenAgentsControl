id: devops-tool-usage-001
name: Correct Tool Usage for Infrastructure
description: |
  Ensures devops uses bash for terraform/kubectl, write/edit for IaC files

category: workflow
agent: security/devops-engineer
model: anthropic/claude-sonnet-4-5

prompt: |
  Run terraform plan on the configuration in ./terraform/

behavior:
  mustUseAnyOf:
    - [bash]
  mustContain:
    - "terraform plan"
  minToolCalls: 1

approvalStrategy:
  type: auto-approve

timeout: 30000

tags:
  - tool-usage
