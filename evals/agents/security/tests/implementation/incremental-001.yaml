id: security-incremental-001
name: Incremental Clearance Workflow Execution
description: |
  Verifies security orchestrator executes clearance workflow incrementally:
  step 1 (devops), step 2 (parallel clearances), step 3 (review), step 4 (decision)

category: implementation
agent: security
model: anthropic/claude-sonnet-4-5

prompt: |
  Set up a new Kubernetes cluster with the following requirements:
  - 3 worker nodes
  - Pod security policies enabled
  - Network policies configured
  
  Follow the dual-clearance process.

behavior:
  mustContain:
    - "CLEAR"
    - "BLOCKED"
    - "decision matrix"
  mustUseAnyOf:
    - [task]
  minToolCalls: 2

expectedViolations:
  - rule: incremental-execution
    shouldViolate: false
    severity: error

approvalStrategy:
  type: auto-approve

timeout: 60000

tags:
  - incremental
  - workflow
