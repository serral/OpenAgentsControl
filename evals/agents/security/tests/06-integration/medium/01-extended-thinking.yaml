id: security-extended-thinking-001
name: Decision Matrix Decomposition
description: |
  Verifies security orchestrator decomposes the decision matrix
  logic before making approval/block decision

category: integration
agent: security
model: anthropic/claude-sonnet-4-5

prompt: |
  I have clearance reports from both subagents:
  
  InfoSec: CLEAR with conditions (data residency validated)
  DevSecOps: BLOCKED (critical finding: unencrypted EBS volumes)
  
  What is your approval decision?

behavior:
  mustContain:
    - "BLOCKED"
    - "DevSecOps"
    - "decision matrix"
    - "unencrypted"
  mustNotContain:
    - "APPROVED"
  minToolCalls: 0

expectedViolations:
  - rule: decision-matrix-applied
    shouldViolate: false
    severity: error

approvalStrategy:
  type: auto-approve

timeout: 30000

tags:
  - extended-thinking
  - decision-logic
