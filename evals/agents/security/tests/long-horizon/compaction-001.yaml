id: security-compaction-001
name: Long Session Handling with Multiple Clearance Cycles
description: |
  Tests security orchestrator's ability to handle long sessions
  with multiple infrastructure changes and clearance cycles

category: long-horizon
agent: security
model: anthropic/claude-sonnet-4-5

prompt: |
  We need to deploy 3 separate infrastructure components:
  1. RDS database (PostgreSQL)
  2. S3 bucket for data storage
  3. Lambda function for data processing
  
  Each requires separate clearance. Process all three.

behavior:
  mustContain:
    - "RDS"
    - "S3"
    - "Lambda"
    - "clearance"
  mustUseAnyOf:
    - [task]
  minToolCalls: 3

expectedViolations:
  - rule: long-session-compaction
    shouldViolate: false
    severity: error

approvalStrategy:
  type: auto-approve

timeout: 90000

tags:
  - long-horizon
  - compaction
  - multiple-clearances
