id: infosec-extended-thinking-001
name: Risk Assessment Calculation
description: |
  Verifies infosec calculates risk using Likelihood × Impact matrix

category: integration
agent: infosec
model: anthropic/claude-sonnet-4-5

prompt: |
  Calculate risk for:
  - No audit logging (Likelihood: High, Impact: Major)
  - Missing MFA (Likelihood: Medium, Impact: Moderate)

behavior:
  mustContain:
    - "risk"
    - "likelihood"
    - "impact"
  minToolCalls: 0

approvalStrategy:
  type: auto-approve

timeout: 30000

tags:
  - extended-thinking
